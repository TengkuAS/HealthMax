[build]
  base = "healthmax_frontend"
  publish = "build/web"
  command = """
  if [ ! -d "flutter" ]; then
    git clone https://github.com/flutter/flutter.git --depth 1 -b stable
  fi

  export PATH="$PATH:$(pwd)/flutter/bin"
  flutter build web --release
  """

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200